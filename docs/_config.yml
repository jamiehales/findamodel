title: FindAModel
description: "A self-hosted 3D model library manager with smart metadata rules"
url: "https://jamiehales.github.io"
baseurl: "/findamodel"

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

# Theme settings
color_scheme: dark

# Navigation
nav_sort: order

# Mermaid diagrams
mermaid:
  version: "10.9.0"

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

# Aux links in header
aux_links:
  "GitHub":
    - "https://github.com/jamiehales/findamodel"

# Footer
footer_content: "FindAModel &mdash; self-hosted 3D model library"

# Kramdown settings
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
