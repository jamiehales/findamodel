name: Build and Publish Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            dotnet-rid: win-x64
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            dotnet-rid: osx-arm64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            dotnet-rid: linux-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: |
            frontend/yarn.lock
            desktop-tauri/yarn.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: yarn --cwd frontend install --frozen-lockfile

      - name: Install desktop-tauri dependencies
        run: yarn --cwd desktop-tauri install --frozen-lockfile

      - name: Publish .NET sidecar
        run: node desktop-tauri/scripts/publish-sidecar.mjs
        env:
          FINDAMODEL_RID: ${{ matrix.dotnet-rid }}

      - name: Build Tauri desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-tauri
          tauriScript: yarn tauri
          args: --target ${{ matrix.rust-target }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: Release ${{ github.ref_name }}
          releaseDraft: true

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.dotnet-rid }}
          path: desktop-tauri/src-tauri/target/${{ matrix.rust-target }}/release/bundle/
          if-no-files-found: error
